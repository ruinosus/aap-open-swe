apiVersion: governance.cockpit.io/v1
kind: Guardrail
metadata:
  name: sizing-scope
  description: Sizing skill can only write the migration report file
spec:
  appliesTo:
    kind: Skill
    when: "id == 'aap-sizing'"
  phase: input
  rules:
    - id: sizing-scope
      category: scope
      onFail: block
      message: 'Sizing skill can only write docs/aap-migration-report.md'
  scope:
    allow_writes: true
    allowed_patterns:
      - 'docs/aap-migration-report.md'
    blocked_patterns:
      - '*.py'
      - '*.ts'
      - '*.tsx'
      - '*.yaml'
      - '*.yml'
      - '*.json'
      - '.github/*'
      - '.aap/*'
      - 'agent/*'
      - 'tests/*'

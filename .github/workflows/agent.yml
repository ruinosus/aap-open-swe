name: AAP Open SWE Agent

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]
  pull_request:
    types: [opened, synchronize, closed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ─── Trigger 1: Issue comment mentioning @aap-open-swe ────
  run-agent:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue &&
      contains(github.event.comment.body, '@aap-open-swe') &&
      !github.event.issue.pull_request
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: React to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout target repo (if different)
        if: env.TARGET_REPO != ''
        run: |
          echo "Target repo override not yet supported — using current repo"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv sync --all-extras
          uv pip install cockpit-aap-sdk

      - name: Extract task from comment
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body;
            // Remove the @aap-open-swe mention and trim
            const task = body.replace(/@aap-open-swe/gi, '').trim();

            // Detect skill commands
            const skillMatch = body.match(/@aap-open-swe\s+(review|security|docs|tests|project-docs|sizing|migrate)\b/i);
            const skillMap = {
              'review': 'code-review',
              'security': 'security-scan',
              'docs': 'project-docs',
              'tests': 'test-generator',
              'project-docs': 'project-docs',
              'sizing': 'aap-sizing',
              'migrate': 'migrate-to-aap',
            };
            const skillId = skillMatch ? skillMap[skillMatch[1].toLowerCase()] || '' : '';
            core.setOutput('skill_id', skillId);

            // Detect --repo=owner/name or repo URL for cross-repo operations
            const repoMatch = task.match(/--repo[= ]([^\s]+)/i)
              || task.match(/https?:\/\/github\.com\/([^\/\s]+\/[^\/\s]+)/i);
            const targetRepo = repoMatch ? repoMatch[1].replace(/\.git$/, '').replace(/^https?:\/\/github\.com\//, '') : '';
            core.setOutput('target_repo', targetRepo);

            // Get issue title and body for context
            const issue = context.payload.issue;
            const fullTask = `Issue #${issue.number}: ${issue.title}\n\n${issue.body || ''}\n\nUser request: ${task}`;

            core.setOutput('task', fullTask);
            core.setOutput('issue_number', issue.number);

      - name: Fork and clone target repo
        id: target
        if: steps.extract.outputs.target_repo != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROSS_REPO_PAT: ${{ secrets.CROSS_REPO_PAT }}
          TARGET_REPO: ${{ steps.extract.outputs.target_repo }}
        run: |
          TARGET_OWNER="${TARGET_REPO%%/*}"
          TARGET_NAME="${TARGET_REPO##*/}"
          SELF_ORG="${{ github.repository_owner }}"
          TARGET_DIR="/tmp/aap-target-repo"

          echo "Target: $TARGET_OWNER/$TARGET_NAME"
          echo "Self org: $SELF_ORG"

          # For external repos, clone the original directly (read-only for sizing).
          # For migration, fork first then clone the fork.
          SKILL_ID="${{ steps.extract.outputs.skill_id }}"

          # Determine the token to use for cross-repo access
          # CROSS_REPO_PAT (fine-grained PAT) enables fork + push to other repos
          # GITHUB_TOKEN only has access to the current repo
          CROSS_TOKEN="${CROSS_REPO_PAT:-}"

          if [ "$TARGET_OWNER" != "$SELF_ORG" ]; then
            if [ "$SKILL_ID" = "migrate-to-aap" ] && [ -n "$CROSS_TOKEN" ]; then
              CLONE_REPO="$SELF_ORG/$TARGET_NAME"
              # Check if fork already exists
              if GITHUB_TOKEN="$CROSS_TOKEN" gh repo view "$CLONE_REPO" --json url > /dev/null 2>&1; then
                echo "Fork $CLONE_REPO already exists"
              else
                echo "Forking $TARGET_OWNER/$TARGET_NAME to $SELF_ORG"
                GITHUB_TOKEN="$CROSS_TOKEN" gh repo fork "$TARGET_OWNER/$TARGET_NAME" --clone=false 2>&1 || true
                sleep 15  # wait for fork to propagate
              fi
              echo "Cloning $CLONE_REPO"
              git clone "https://x-access-token:${CROSS_TOKEN}@github.com/${CLONE_REPO}.git" "$TARGET_DIR"
            elif [ "$SKILL_ID" = "migrate-to-aap" ] && [ -z "$CROSS_TOKEN" ]; then
              echo "ERROR: Migration to external repos requires CROSS_REPO_PAT secret."
              echo "Set up a fine-grained PAT at https://github.com/settings/tokens?type=beta"
              echo "with Contents (read/write), Pull requests (read/write), Administration (read)."
              exit 1
            else
              echo "Sizing: cloning $TARGET_OWNER/$TARGET_NAME"
              if [ -n "$CROSS_TOKEN" ]; then
                # Clone via PAT so the agent can push the report to a branch
                CLONE_REPO="$SELF_ORG/$TARGET_NAME"
                # Ensure fork exists for sizing too (to push the report)
                if ! GITHUB_TOKEN="$CROSS_TOKEN" gh repo view "$CLONE_REPO" --json url > /dev/null 2>&1; then
                  GITHUB_TOKEN="$CROSS_TOKEN" gh repo fork "$TARGET_OWNER/$TARGET_NAME" --clone=false 2>&1 || true
                  sleep 15
                fi
                git clone "https://x-access-token:${CROSS_TOKEN}@github.com/${CLONE_REPO}.git" "$TARGET_DIR"
              else
                # No PAT — clone public repo read-only (report won't be pushed)
                git clone "https://github.com/${TARGET_OWNER}/${TARGET_NAME}.git" "$TARGET_DIR"
                CLONE_REPO="$TARGET_OWNER/$TARGET_NAME"
              fi
            fi
          else
            CLONE_REPO="$TARGET_OWNER/$TARGET_NAME"
            git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${CLONE_REPO}.git" "$TARGET_DIR"
          fi

          # For migrate: merge the sizing branch so the report is available
          if [ "$SKILL_ID" = "migrate-to-aap" ] && [ -d "$TARGET_DIR" ]; then
            cd "$TARGET_DIR"
            git fetch origin aap-migration/sizing 2>/dev/null && \
              git merge origin/aap-migration/sizing --no-edit 2>/dev/null && \
              echo "Merged aap-migration/sizing branch (contains sizing report)" || \
              echo "No sizing branch found — migrate will fail if report is missing"
            cd -
          fi

          # Output for next steps
          echo "target_dir=$TARGET_DIR" >> $GITHUB_OUTPUT
          echo "target_owner=${CLONE_REPO%%/*}" >> $GITHUB_OUTPUT
          echo "target_name=${CLONE_REPO##*/}" >> $GITHUB_OUTPUT
          echo "is_fork=$( [ "$TARGET_OWNER" != "$SELF_ORG" ] && echo true || echo false )" >> $GITHUB_OUTPUT

      - name: Run agent
        id: agent
        env:
          TASK: ${{ steps.extract.outputs.task }}
          SKILL_ID: ${{ steps.extract.outputs.skill_id }}
          REPO_DIR: ${{ steps.target.outputs.target_dir || github.workspace }}
          REPO_OWNER: ${{ steps.target.outputs.target_owner || github.repository_owner }}
          REPO_NAME: ${{ steps.target.outputs.target_name || github.event.repository.name }}
          ISSUE_NUMBER: ${{ steps.extract.outputs.issue_number }}
          PR_NUMBER: ${{ github.event.issue.number }}
          GITHUB_TOKEN: ${{ steps.extract.outputs.target_repo != '' && secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPEN_SWE_MODEL: ${{ vars.OPEN_SWE_MODEL || 'openai:gpt-4o' }}
          SANDBOX_TYPE: local
          SOURCE_ISSUE_REPO: ${{ github.repository }}
          SOURCE_ISSUE_NUMBER: ${{ steps.extract.outputs.issue_number }}
        run: |
          source .venv/bin/activate
          PYTHONPATH=${{ github.workspace }} python agent/run_standalone.py

      - name: Create Pull Request
        if: steps.agent.outputs.has_changes == 'true'
        id: create-pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.extract.outputs.target_repo != '' && secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const branch = '${{ steps.agent.outputs.branch_name }}';
            const issueNumber = ${{ steps.extract.outputs.issue_number }};
            const skillId = '${{ steps.extract.outputs.skill_id }}';

            // Use target repo if cross-repo operation, otherwise current repo
            const targetOwner = '${{ steps.target.outputs.target_owner }}' || context.repo.owner;
            const targetName = '${{ steps.target.outputs.target_name }}' || context.repo.repo;

            // PR title based on skill
            let prTitle = `fix: address issue #${issueNumber}`;
            if (skillId === 'migrate-to-aap') prTitle = `feat: AAP SDK migration`;
            if (skillId === 'aap-sizing') prTitle = `docs: AAP SDK sizing report`;

            // Check if PR already exists
            const { data: prs } = await github.rest.pulls.list({
              owner: targetOwner,
              repo: targetName,
              head: `${targetOwner}:${branch}`,
              state: 'open'
            });

            let prUrl;
            if (prs.length > 0) {
              prUrl = prs[0].html_url;
              core.info(`PR already exists: ${prUrl}`);
            } else {
              const { data: pr } = await github.rest.pulls.create({
                owner: targetOwner,
                repo: targetName,
                title: prTitle,
                body: `## Description\nAutomated by AAP Open SWE agent (${skillId || 'swe-coder'}).\n\nTriggered from ${context.repo.owner}/${context.repo.repo}#${issueNumber}`,
                head: branch,
                base: 'main',
                draft: true
              });
              prUrl = pr.html_url;
              core.info(`PR created: ${prUrl}`);
            }

            core.setOutput('pr_url', prUrl);

      - name: Comment on issue
        if: always() && steps.agent.outcome == 'success'
        env:
          AGENT_RESPONSE: ${{ steps.agent.outputs.agent_response }}
          SKILL_ID: ${{ steps.extract.outputs.skill_id }}
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ steps.extract.outputs.issue_number }};
            const hasChanges = '${{ steps.agent.outputs.has_changes }}' === 'true';
            const prUrl = '${{ steps.create-pr.outputs.pr_url }}' || '';
            const agentResponse = (process.env.AGENT_RESPONSE || '').slice(0, 5000);
            const skillId = process.env.SKILL_ID || '';

            let comment;

            // Sizing reports are pre-formatted as markdown by run_standalone.py
            if (skillId === 'aap-sizing') {
              comment = agentResponse.startsWith('##') ? agentResponse : `### AAP Open SWE Agent — Sizing\n\n${agentResponse}`;
            } else if (hasChanges && prUrl) {
              comment = `### AAP Open SWE Agent\n\nI've analyzed the issue and opened a draft PR with the fix:\n${prUrl}\n\n<details>\n<summary>Agent output</summary>\n\n${agentResponse}\n\n</details>`;
            } else {
              comment = `### AAP Open SWE Agent\n\n${agentResponse || 'I analyzed the issue but no code changes were needed.'}`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });

  # ─── Trigger 2: Issue created with @aap-open-swe in title or body ──
  run-agent-on-open:
    if: |
      github.event_name == 'issues' &&
      github.event.action == 'opened' &&
      (contains(github.event.issue.title, '@aap-open-swe') ||
       contains(github.event.issue.body, '@aap-open-swe'))
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: React to issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              content: 'eyes'
            });

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv sync --all-extras
          uv pip install cockpit-aap-sdk

      - name: Build task from issue
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const fullTask = `Issue #${issue.number}: ${issue.title}\n\n${issue.body || ''}`;
            core.setOutput('task', fullTask);
            core.setOutput('issue_number', issue.number);

      - name: Run agent
        id: agent
        env:
          TASK: ${{ steps.extract.outputs.task }}
          REPO_DIR: ${{ github.workspace }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ steps.extract.outputs.issue_number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPEN_SWE_MODEL: ${{ vars.OPEN_SWE_MODEL || 'openai:gpt-4o' }}
          SANDBOX_TYPE: local
        run: |
          source .venv/bin/activate
          PYTHONPATH=. python agent/run_standalone.py

      - name: Create Pull Request
        if: steps.agent.outputs.has_changes == 'true'
        id: create-pr
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ steps.agent.outputs.branch_name }}';
            const issueNumber = ${{ steps.extract.outputs.issue_number }};
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `fix: address issue #${issueNumber}`,
              body: `## Description\nAutomated fix for #${issueNumber} by AAP Open SWE agent.\n\nCloses #${issueNumber}`,
              head: branch,
              base: 'main',
              draft: true
            });
            core.setOutput('pr_url', pr.html_url);

      - name: Comment on issue
        if: always() && steps.agent.outcome == 'success'
        env:
          AGENT_RESPONSE: ${{ steps.agent.outputs.agent_response }}
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ steps.extract.outputs.issue_number }};
            const hasChanges = '${{ steps.agent.outputs.has_changes }}' === 'true';
            const prUrl = '${{ steps.create-pr.outputs.pr_url }}' || '';
            const agentResponse = (process.env.AGENT_RESPONSE || '').slice(0, 5000);
            let comment;
            if (hasChanges && prUrl) {
              comment = `### AAP Open SWE Agent\n\nI've analyzed the issue and opened a draft PR with the fix:\n${prUrl}\n\n<details>\n<summary>Agent output</summary>\n\n${agentResponse}\n\n</details>`;
            } else {
              comment = `### AAP Open SWE Agent\n\n${agentResponse || 'I analyzed the issue but no code changes were needed.'}`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });

  # ─── Trigger 3: Issue assigned to aap-open-swe ────────────
  run-agent-on-assign:
    if: |
      github.event_name == 'issues' &&
      github.event.action == 'assigned' &&
      github.event.assignee.login == 'aap-open-swe'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: React to issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              content: 'eyes'
            });

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv sync --all-extras
          uv pip install cockpit-aap-sdk

      - name: Build task from issue
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const fullTask = `Issue #${issue.number}: ${issue.title}\n\n${issue.body || ''}`;
            core.setOutput('task', fullTask);
            core.setOutput('issue_number', issue.number);

      - name: Run agent
        id: agent
        env:
          TASK: ${{ steps.extract.outputs.task }}
          REPO_DIR: ${{ github.workspace }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ steps.extract.outputs.issue_number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPEN_SWE_MODEL: ${{ vars.OPEN_SWE_MODEL || 'openai:gpt-4o' }}
          SANDBOX_TYPE: local
        run: |
          source .venv/bin/activate
          PYTHONPATH=. python agent/run_standalone.py

      - name: Create Pull Request
        if: steps.agent.outputs.has_changes == 'true'
        id: create-pr
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ steps.agent.outputs.branch_name }}';
            const issueNumber = ${{ steps.extract.outputs.issue_number }};
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `fix: address issue #${issueNumber}`,
              body: `## Description\nAutomated fix for #${issueNumber} by AAP Open SWE agent.\n\nCloses #${issueNumber}`,
              head: branch,
              base: 'main',
              draft: true
            });
            core.setOutput('pr_url', pr.html_url);

      - name: Comment on issue
        if: always() && steps.agent.outcome == 'success'
        env:
          AGENT_RESPONSE: ${{ steps.agent.outputs.agent_response }}
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ steps.extract.outputs.issue_number }};
            const hasChanges = '${{ steps.agent.outputs.has_changes }}' === 'true';
            const prUrl = '${{ steps.create-pr.outputs.pr_url }}' || '';
            const agentResponse = (process.env.AGENT_RESPONSE || '').slice(0, 5000);
            let comment;
            if (hasChanges && prUrl) {
              comment = `### AAP Open SWE Agent\n\nI've been assigned to this issue and opened a draft PR:\n${prUrl}\n\n<details>\n<summary>Agent output</summary>\n\n${agentResponse}\n\n</details>`;
            } else {
              comment = `### AAP Open SWE Agent\n\n${agentResponse || 'I analyzed the issue but no code changes were needed.'}`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });

  # ─── Trigger 4: Issue labeled with 'aap-open-swe' ────────
  run-agent-on-label:
    if: |
      github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'aap-open-swe'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: React to issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              content: 'eyes'
            });

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv sync --all-extras
          uv pip install cockpit-aap-sdk

      - name: Build task from issue
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const fullTask = `Issue #${issue.number}: ${issue.title}\n\n${issue.body || ''}`;
            core.setOutput('task', fullTask);
            core.setOutput('issue_number', issue.number);

      - name: Run agent
        id: agent
        env:
          TASK: ${{ steps.extract.outputs.task }}
          REPO_DIR: ${{ github.workspace }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ steps.extract.outputs.issue_number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPEN_SWE_MODEL: ${{ vars.OPEN_SWE_MODEL || 'openai:gpt-4o' }}
          SANDBOX_TYPE: local
        run: |
          source .venv/bin/activate
          PYTHONPATH=. python agent/run_standalone.py

      - name: Create Pull Request
        if: steps.agent.outputs.has_changes == 'true'
        id: create-pr
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ steps.agent.outputs.branch_name }}';
            const issueNumber = ${{ steps.extract.outputs.issue_number }};
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `fix: address issue #${issueNumber}`,
              body: `## Description\nAutomated fix for #${issueNumber} by AAP Open SWE agent.\n\nCloses #${issueNumber}`,
              head: branch,
              base: 'main',
              draft: true
            });
            core.setOutput('pr_url', pr.html_url);

      - name: Comment on issue
        if: always() && steps.agent.outcome == 'success'
        env:
          AGENT_RESPONSE: ${{ steps.agent.outputs.agent_response }}
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ steps.extract.outputs.issue_number }};
            const hasChanges = '${{ steps.agent.outputs.has_changes }}' === 'true';
            const prUrl = '${{ steps.create-pr.outputs.pr_url }}' || '';
            const agentResponse = (process.env.AGENT_RESPONSE || '').slice(0, 5000);
            let comment;
            if (hasChanges && prUrl) {
              comment = `### AAP Open SWE Agent\n\nLabel trigger: I've analyzed the issue and opened a draft PR:\n${prUrl}\n\n<details>\n<summary>Agent output</summary>\n\n${agentResponse}\n\n</details>`;
            } else {
              comment = `### AAP Open SWE Agent\n\n${agentResponse || 'I analyzed the issue but no code changes were needed.'}`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });

  # ─── Trigger 5: PR comment mentioning @aap-open-swe ──────
  run-agent-pr:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@aap-open-swe')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: React to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Get PR details
        id: pr-details
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.issue.number
            });
            core.setOutput('branch', pr.head.ref);
            core.setOutput('pr_number', pr.number);

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-details.outputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv sync --all-extras
          uv pip install cockpit-aap-sdk

      - name: Extract task from comment
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body;
            const task = body.replace(/@aap-open-swe/gi, '').trim();

            // Detect skill commands
            const skillMatch = body.match(/@aap-open-swe\s+(review|security|docs|tests|project-docs|sizing|migrate)\b/i);
            const skillMap = {
              'review': 'code-review',
              'security': 'security-scan',
              'docs': 'project-docs',
              'tests': 'test-generator',
              'project-docs': 'project-docs',
              'sizing': 'aap-sizing',
              'migrate': 'migrate-to-aap',
            };
            const skillId = skillMatch ? skillMap[skillMatch[1].toLowerCase()] || '' : '';
            core.setOutput('skill_id', skillId);

            const issue = context.payload.issue;
            const fullTask = `PR #${issue.number}: ${issue.title}\n\n${issue.body || ''}\n\nReview comment: ${task}`;
            core.setOutput('task', fullTask);
            core.setOutput('issue_number', issue.number);

      - name: Run agent on PR branch
        id: agent
        env:
          TASK: ${{ steps.extract.outputs.task }}
          SKILL_ID: ${{ steps.extract.outputs.skill_id }}
          REPO_DIR: ${{ github.workspace }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ steps.extract.outputs.issue_number }}
          PR_NUMBER: ${{ github.event.issue.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPEN_SWE_MODEL: ${{ vars.OPEN_SWE_MODEL || 'openai:gpt-4o' }}
          SANDBOX_TYPE: local
        run: |
          source .venv/bin/activate
          PYTHONPATH=. python agent/run_standalone.py

      - name: Push changes to PR branch
        if: steps.agent.outputs.has_changes == 'true'
        run: |
          git push origin ${{ steps.pr-details.outputs.branch }}

      - name: Comment on PR
        env:
          AGENT_RESPONSE: ${{ steps.agent.outputs.agent_response }}
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.pr-details.outputs.pr_number }};
            const hasChanges = '${{ steps.agent.outputs.has_changes }}' === 'true';
            const agentResponse = (process.env.AGENT_RESPONSE || '').slice(0, 5000);

            let comment;
            if (hasChanges) {
              comment = `### AAP Open SWE Agent\n\nI've pushed changes to address your review comment.\n\n<details>\n<summary>Agent output</summary>\n\n${agentResponse}\n\n</details>`;
            } else {
              comment = `### AAP Open SWE Agent\n\n${agentResponse || 'I analyzed the request but no code changes were needed.'}`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: comment
            });

  # ─── Trigger 6: PR opened/updated → code-review + security-scan ──
  run-review:
    if: |
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' || github.event.action == 'synchronize')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv sync --all-extras
          uv pip install cockpit-aap-sdk

      - name: Run code review
        env:
          SKILL_ID: code-review
          TASK: "Review the PR diff and provide inline feedback"
          REPO_DIR: ${{ github.workspace }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ISSUE_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPEN_SWE_MODEL: ${{ vars.OPEN_SWE_MODEL || 'anthropic:claude-sonnet-4-6' }}
          SANDBOX_TYPE: local
        run: |
          source .venv/bin/activate
          PYTHONPATH=. python agent/run_standalone.py

      - name: Run security scan
        env:
          SKILL_ID: security-scan
          TASK: "Scan the PR diff for security vulnerabilities"
          REPO_DIR: ${{ github.workspace }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ISSUE_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPEN_SWE_MODEL: ${{ vars.OPEN_SWE_MODEL || 'anthropic:claude-sonnet-4-6' }}
          SANDBOX_TYPE: local
        run: |
          source .venv/bin/activate
          PYTHONPATH=. python agent/run_standalone.py

  # ─── Trigger 7: PR merged to main → doc-generator ──
  run-doc-gen:
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv sync --all-extras
          uv pip install cockpit-aap-sdk

      - name: Run doc generator
        id: agent
        env:
          SKILL_ID: doc-generator
          TASK: "Analyze recent changes and generate/update documentation"
          REPO_DIR: ${{ github.workspace }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ISSUE_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPEN_SWE_MODEL: ${{ vars.OPEN_SWE_MODEL || 'anthropic:claude-sonnet-4-6' }}
          SANDBOX_TYPE: local
        run: |
          source .venv/bin/activate
          PYTHONPATH=. python agent/run_standalone.py

      - name: Create Pull Request
        if: steps.agent.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ steps.agent.outputs.branch_name }}';
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'docs: auto-update documentation',
              body: '## Description\nAutomated documentation update by AAP Open SWE agent (doc-generator skill).',
              head: branch,
              base: 'main',
              draft: true
            });
            core.info(`Doc PR created: ${pr.html_url}`);

  # ─── Trigger 8: Label 'needs-tests' → test-generator ──
  run-test-gen:
    if: |
      github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'needs-tests'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: React to issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              content: 'eyes'
            });

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv sync --all-extras
          uv pip install cockpit-aap-sdk

      - name: Run test generator
        id: agent
        env:
          SKILL_ID: test-generator
          TASK: "Generate unit tests for code with low or no test coverage"
          REPO_DIR: ${{ github.workspace }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_NUMBER: "0"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPEN_SWE_MODEL: ${{ vars.OPEN_SWE_MODEL || 'anthropic:claude-sonnet-4-6' }}
          SANDBOX_TYPE: local
        run: |
          source .venv/bin/activate
          PYTHONPATH=. python agent/run_standalone.py

      - name: Create Pull Request
        if: steps.agent.outputs.has_changes == 'true'
        id: create-pr
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ steps.agent.outputs.branch_name }}';
            const issueNumber = ${{ github.event.issue.number }};
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `test: add tests for issue #${issueNumber}`,
              body: `## Description\nAutomated test generation for #${issueNumber} by AAP Open SWE agent (test-generator skill).\n\nCloses #${issueNumber}`,
              head: branch,
              base: 'main',
              draft: true
            });
            core.setOutput('pr_url', pr.html_url);

      - name: Comment on issue
        if: always() && steps.agent.outcome == 'success'
        env:
          AGENT_RESPONSE: ${{ steps.agent.outputs.agent_response }}
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ github.event.issue.number }};
            const hasChanges = '${{ steps.agent.outputs.has_changes }}' === 'true';
            const prUrl = '${{ steps.create-pr.outputs.pr_url }}' || '';
            const agentResponse = (process.env.AGENT_RESPONSE || '').slice(0, 5000);
            let comment;
            if (hasChanges && prUrl) {
              comment = `### AAP Open SWE Agent — Test Generator\n\nI've generated tests and opened a draft PR:\n${prUrl}\n\n<details>\n<summary>Agent output</summary>\n\n${agentResponse}\n\n</details>`;
            } else {
              comment = `### AAP Open SWE Agent — Test Generator\n\n${agentResponse || 'I analyzed the code but could not generate tests.'}`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });
